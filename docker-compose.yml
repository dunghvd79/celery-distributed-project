services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: celery_rabbitmq
    ports:
      - "5672:5672"       # AMQP port (Celery kết nối)
      - "15672:15672"     # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: celery_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: celery_postgres
    ports:
      - "5433:5432"     # Host 5433 → Container 5432 (tránh conflict với PostgreSQL local)
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-celerydb}
      POSTGRES_USER: ${POSTGRES_USER:-celery}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-celery123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celery"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:
